validators:
  bl_no:
    description: 提单号 — 2~4位字母 + 6~10位数字
    pattern: '[A-Z]{2,4}\d{6,10}'
  date:
    description: 日期 — yyyy/mm/dd、dd/mm/yyyy 或对应横线格式
    pattern: \d{1,4}[/-]\d{1,2}[/-]\d{1,4}
  weight:
    description: 重量 — 去掉 KGS/KG/TONS 单位后缀，取数值部分
    pattern: '[\d,]+\.?\d*'
    strip_suffix: KGS,KG,TONS
  volume:
    description: 体积 — 去掉 CBM 单位后缀，取数值部分
    pattern: '[\d,]+\.?\d*'
    strip_suffix: CBM
  place_date:
    description: 签发地+日期合并 — 分离地点部分（去掉末尾的逗号+日期）
  auto_document_no:
    description: document_no auto-generated
    pattern: ^DO\-EXP\-018\d$
  auto_sender_phone:
    description: sender_phone auto-generated
    pattern: ^1\d\d\d\d\d\d\d\d\d\d$
  auto_tracking_no:
    description: tracking_no auto-generated
    pattern: ^[A-Za-z\d][A-Za-z\d]\d\d\d\d\d\d\d\d\d\d\d.*$
  auto_单证编号:
    description: 单证编号 auto-generated
    pattern: ^DO\-EXP\-018\d$
  auto_发货方 SHIPPER 电话:
    description: 发货方 SHIPPER 电话 auto-generated
    pattern: ^1\d\d\d\d\d\d\d\d\d\d$
  auto_item_code1:
    description: item_code1 auto-generated
    pattern: ^MAT\-00\d$
  auto_spec1:
    description: spec1 auto-generated
    pattern: ^[A-Za-z\d]\d[A-Za-z\d].*$
